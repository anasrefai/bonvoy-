<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — BonVoy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="../assets/logo.svg" alt="BonVoy" width="140" height="38">
    </div>
    <h1>Admin Login</h1>
    <p class="subtitle">BonVoy Dashboard</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="admin@example.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">Login</button>
    </form>

    <div class="login-error" id="login-error">Invalid credentials. Please try again.</div>
    <div class="lockout-msg" id="lockout-msg"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
(function () {
  'use strict';

  // If already signed in, skip to dashboard
  firebase.auth().onAuthStateChanged(user => {
    if (user) window.location.replace('/admin/dashboard.html');
  });

  const form      = document.getElementById('login-form');
  const emailEl   = document.getElementById('email');
  const passEl    = document.getElementById('password');
  const btnLogin  = document.getElementById('btn-login');
  const errEl     = document.getElementById('login-error');
  const lockoutEl = document.getElementById('lockout-msg');

  let failCount   = 0;
  let lockedUntil = 0;

  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.classList.remove('visible');

    // Lockout check
    if (Date.now() < lockedUntil) return;

    const email    = emailEl.value.trim();
    const password = passEl.value;

    btnLogin.disabled = true;
    btnLogin.innerHTML = '<span class="spinner"></span>';

    try {
      await firebase.auth().signInWithEmailAndPassword(email, password);
      failCount = 0;
      window.location.replace('/admin/dashboard.html');
    } catch (_) {
      failCount++;
      errEl.classList.add('visible');

      if (failCount >= 5) {
        lockedUntil = Date.now() + 30000;
        btnLogin.disabled = true;
        startLockoutTimer();
      } else {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Login';
      }
    }
  });

  function startLockoutTimer() {
    lockoutEl.classList.add('visible');
    const tick = () => {
      const remaining = Math.ceil((lockedUntil - Date.now()) / 1000);
      if (remaining <= 0) {
        lockoutEl.classList.remove('visible');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Login';
        failCount = 0;
        return;
      }
      lockoutEl.textContent = `Too many failed attempts. Try again in ${remaining}s`;
      btnLogin.textContent  = `Wait ${remaining}s…`;
      setTimeout(tick, 1000);
    };
    tick();
  }
})();
</script>
</body>
</html>
